<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CINE FOCUS | ESTÚDIO DE PRODUÇÃO</title>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: #121212; padding: 30px; border-radius: 16px; border: 1px solid #333; }
        h1 { color: #ffab40; text-align: center; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        .label-field { display: block; margin-top: 15px; font-size: 11px; color: #ffab40; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 14px; margin-top: 5px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; }
        .btn-prod { width: 100%; padding: 18px; background: #ffab40; color: #000; font-weight: bold; border: none; cursor: pointer; margin-top: 25px; border-radius: 8px; font-size: 16px; }
        .btn-vendas { width: 100%; padding: 14px; background: transparent; color: #ffab40; border: 1px solid #ffab40; cursor: pointer; margin-top: 15px; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>CINE FOCUS | PRODUÇÃO</h1>
    
    <label class="label-field">API KEY DE CONEXÃO</label>
    <input type="password" id="api-key" placeholder="Insira sua Chave de API para gerar arquivos">
    
    <label class="label-field">PEDIDO DE ESTAMPA</label>
    <textarea id="prompt" rows="3" placeholder="Descreva a estampa, estilo e material..."></textarea>
    
    <label class="label-field">MATERIAL / SUPERFÍCIE</label>
    <select id="superficie">
        <option>Papelaria de Luxo</option>
        <option>Pratos e Cerâmica</option>
        <option>Guardanapos e Festas</option>
        <option>Tecidos e Superfícies Gerais</option>
    </select>

    <button class="btn-prod" onclick="produzir()">INICIAR PRODUÇÃO REAL</button>
    <button class="btn-vendas" onclick="window.location.href='SUA_URL_DE_PAGAMENTO_AQUI'">ASSINATURA CINE FOCUS (PRO)</button>
</div>

<script>
    function produzir() {
        const key = document.getElementById('api-key').value;
        const p = document.getElementById('prompt').value;
        if(!key) { alert("Atenção: Insira a Chave API para conectar o motor de geração."); return; }
        if(!p) { alert("Descreva sua estampa para iniciar."); return; }
        alert("Motor conectado. Processando estampa para: " + document.getElementById('superficie').value);
    }
</script>
</body>
</html>
